<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuzins — A Tiny Dungeons & Dragons Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  
  <div class="scene" aria-hidden="true">
    <div class="stars"></div>
    <div class="moon"></div>
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
    <div class="hill h1"></div>
    <div class="hill h2"></div>
    <div class="hill h3"></div>
    <div class="grain"></div>
  </div>

  <header class="top-bar" data-testid="top-bar">
    <div class="brand">
      <span class="brand-mark">✦</span>
      <span class="brand-name">Kuzins</span>
    </div>
    <div class="top-actions">
      <span id="phase-pill" class="pill" data-testid="phase-pill">Setup</span>
      <button id="reset-btn" class="ghost-btn" data-testid="reset-btn" title="Start a fresh tale">Reset Tale</button>
    </div>
  </header>

  <main id="app" class="stage"></main>


  
  <template id="tpl-welcome">
    <section class="panel welcome-panel" data-testid="welcome-panel">
      <div class="panel-header">
        <p class="eyebrow">Chapter Zero</p>
        <h1 class="display">A tiny tabletop tale,<br/><em>told by you and your friends.</em></h1>
        <p class="lede">Pick a storyteller (the Dungeon Master), gather your party, design adorable
          heroes with magical strengths and silly weaknesses, then roll dice & solve riddles to
          shape a story that ends in either a triumphant dance — or a dramatic demise.</p>
      </div>

      <div class="welcome-grid">
        <label class="field">
          <span class="field-label">How many players (excluding the Master)?</span>
          <input type="number" id="player-count" min="1" max="6" value="3" data-testid="player-count-input" />
          <span class="field-hint">1 – 6 brave souls</span>
        </label>
        <label class="field">
          <span class="field-label">Name of the Dungeon Master</span>
          <input type="text" id="dm-name" maxlength="20" placeholder="e.g. Auntie Mossbeard" data-testid="dm-name-input" />
        </label>
      </div>

      <div class="actions-row">
        <button id="begin-creation-btn" class="primary-btn" data-testid="begin-creation-btn">
          Begin Character Creation →
        </button> 
      

    
    
    </section>
  </template>

  
  <template id="tpl-creator">
    <section class="panel creator-panel" data-testid="creator-panel">
      <div class="panel-header">
        <p class="eyebrow">Chapter One · Forging Heroes</p>
        <h2 class="display sm">Player <span data-slot="idx"></span> of <span data-slot="total"></span> — design your hero.</h2>
      </div>

      <div class="creator-grid">
        
        <div class="avatar-stage" data-testid="avatar-stage">
          <div class="avatar" id="live-avatar">
            <div class="hat"></div>
            <div class="cloak"></div>
            <div class="head">
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="cheek left"></div>
              <div class="cheek right"></div>
              <div class="mouth"></div>
            </div>
            <div class="hand left"><div class="element-fx"></div></div>
            <div class="hand right"><div class="weapon"></div></div>
            <div class="shadow"></div>
          </div>
          <div class="hp-preview">
            <span class="hp-label">Vitality</span>
            <div class="hp-bar"><div class="hp-fill" style="width:100%"></div></div>
            <span class="hp-value" data-slot="hp">100</span>
          </div>
        </div>

        
        <form class="creator-form" id="creator-form" data-testid="creator-form">
          <label class="field">
            <span class="field-label">Hero name</span>
            <input type="text" name="name" maxlength="18" placeholder="e.g. Pip the Bramble Knight" required data-testid="char-name-input" />
          </label>

          <label class="field">
            <span class="field-label">Class</span>
            <select name="kind" data-testid="char-kind-select">
              <option value="wizard">Wizard</option>
              <option value="elf">Elf</option>
              <option value="prince">Prince</option>
              <option value="warrior">Warrior</option>
              <option value="thief">Thief</option>
              <option value="bard">Bard</option>
              <option value="beastfolk">Animal-Folk</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Hat</span>
            <select name="hat" data-testid="char-hat-select">
              <option value="none">None — bare-headed</option>
              <option value="wizard">Pointed wizard hat</option>
              <option value="crown">Tiny crown</option>
              <option value="hood">Hooded cowl</option>
              <option value="feather">Feathered cap</option>
              <option value="leaf">Leaf-leaf circlet</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Cloak colour</span>
            <select name="cloak" data-testid="char-cloak-select">
              <option value="rose">Rosewater pink</option>
              <option value="moss">Moss green</option>
              <option value="ink">Ink violet</option>
              <option value="ember">Ember orange</option>
              <option value="sky">Sky teal</option>
              <option value="bone">Bone white</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Weapon / Wand</span>
            <select name="weapon" data-testid="char-weapon-select">
              <option value="wand">Wand</option>
              <option value="sword">Short sword</option>
              <option value="bow">Tiny bow</option>
              <option value="staff">Twisted staff</option>
              <option value="dagger">Curved dagger</option>
              <option value="lute">Battle lute</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Eyes (expression)</span>
            <select name="eyes" data-testid="char-eyes-select">
              <option value="sparkle">Sparkly &amp; hopeful</option>
              <option value="sleepy">Sleepy &amp; soft</option>
              <option value="fierce">Fierce &amp; narrow</option>
              <option value="curious">Round &amp; curious</option>
              <option value="mischief">Mischievous wink</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Elemental strength</span>
            <select name="strength" data-testid="char-strength-select">
              <option value="fire">Fire — flames flicker in their palm</option>
              <option value="ice">Ice — frost curls from their fingertips</option>
              <option value="light">Light — a sunbeam halo glows</option>
              <option value="shadow">Shadow — dusk pools around them</option>
              <option value="nature">Nature — leaves swirl in their breath</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Weakness (their secret undoing)</span>
            <select name="weakness" data-testid="char-weakness-select">
              <option value="water">Water</option>
              <option value="iron">Cold iron</option>
              <option value="silence">Silence</option>
              <option value="mirrors">Mirrors</option>
              <option value="sweets">Sweet treats</option>
            </select>
          </label>

          <fieldset class="field role-field">
            <legend class="field-label">Role in the tale</legend>
            <label class="role-pick">
              <input type="radio" name="role" value="protagonist" checked data-testid="char-role-protagonist" />
              <span>Protagonist — the cosy hero</span>
            </label>
            <label class="role-pick">
              <input type="radio" name="role" value="antagonist" data-testid="char-role-antagonist" />
              <span>Antagonist — the dramatic villain</span>
            </label>
          </fieldset>

          <div class="actions-row tight">
            <button type="submit" class="primary-btn" data-testid="save-char-btn">
              Save Hero →
            </button>
          </div>
        </form>
      </div>
    </section>
  </template>

 
  <template id="tpl-theme">
    <section class="panel theme-panel" data-testid="theme-panel">
      <div class="panel-header">
        <p class="eyebrow">Chapter Two · The Mood of the World</p>
        <h2 class="display sm">Master, pick a theme for tonight's tale.</h2>
      </div>

      <div class="theme-grid" id="theme-grid"></div>

      <div class="party-preview" id="party-preview"></div>

      <div class="actions-row">
        <button id="start-game-btn" class="primary-btn" data-testid="start-game-btn" disabled>
          Begin the Tale →
        </button>
      </div>
    </section>
  </template>


  <template id="tpl-game">
    <section class="panel game-panel" data-testid="game-panel">
      <aside class="party-rail" id="party-rail" data-testid="party-rail"></aside>

      <div class="game-main">
        <div class="theme-banner" id="theme-banner"></div>

        <div class="narration" id="narration" data-testid="narration"></div>

        <div class="turn-card" id="turn-card" data-testid="turn-card">
          <p class="eyebrow">It is your turn</p>
          <h3 class="turn-name" id="turn-name"></h3>

          <label class="field">
            <span class="field-label">Narrate your action</span>
            <textarea id="action-text" rows="2" placeholder="I creep along the mossy wall and ready a spark..." data-testid="action-text"></textarea>
          </label>

          <div class="turn-actions">
            <label class="field target-field">
              <span class="field-label">Target</span>
              <select id="target-select" data-testid="target-select"></select>
            </label>
            <button id="attack-btn" class="primary-btn" data-testid="attack-btn">Attack with Riddle ⚔</button>
            <button id="skip-btn" class="ghost-btn" data-testid="skip-btn">Pass turn</button>
          </div>
        </div>

        <div class="log" id="log" data-testid="log"></div>
      </div>
    </section>
  </template>

  <template id="tpl-riddle">
    <div class="modal-backdrop" data-testid="riddle-modal">
      <div class="modal riddle-modal">
        <p class="eyebrow"><span data-slot="attacker"></span> attacks <span data-slot="target"></span></p>
        <h3 class="display sm">A Riddle to Strike True</h3>
        <p class="riddle-text" id="riddle-text">…fetching a riddle from the wind…</p>
        <div class="riddle-source"><span id="riddle-source-tag" class="tag"></span>
          <button id="reroll-riddle" class="ghost-btn tiny" data-testid="reroll-riddle">↻ another riddle</button>
          <button id="custom-riddle" class="ghost-btn tiny" data-testid="custom-riddle">✎ write my own</button>
        </div>

        <label class="field">
          <span class="field-label">Your answer</span>
          <input type="text" id="riddle-answer" placeholder="speak softly…" autocomplete="off" data-testid="riddle-answer-input" />
        </label>

        <div class="dice-tray" id="dice-tray" data-testid="dice-tray">
          <div class="die d20" id="die-d20"><span>20</span></div>
          <div class="die d6"  id="die-d6"><span>6</span></div>
        </div>

        <div class="actions-row">
          <button id="roll-btn" class="primary-btn" data-testid="roll-btn">Solve &amp; Roll 🎲</button>
          <button id="reveal-btn" class="ghost-btn" data-testid="reveal-btn">Give up &amp; reveal</button>
        </div>
        <p class="riddle-result" id="riddle-result"></p>
      </div>
    </div>
  </template>

  
  <template id="tpl-credits">
    <section class="panel credits-panel" data-testid="credits-panel">
      <div class="panel-header center">
        <p class="eyebrow">Fin · The credits roll</p>
        <h2 class="display">And so the tale ended.</h2>
        <p class="lede" id="credits-summary"></p>
      </div>

      <div class="dance-floor" id="dance-floor" data-testid="dance-floor"></div>

      <div class="credits-list" id="credits-list"></div>

      <div class="actions-row center">
        <button id="play-again" class="primary-btn" data-testid="play-again-btn">Tell another tale →</button>
      </div>
    </section>
  </template>

  <script src="game.js"></script>

</body>
</html>
